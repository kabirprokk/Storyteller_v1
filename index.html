<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b0b0b">
<meta name="description" content="Storyteller — stories that stay with you.">
<title>STORYTELLER</title>
<link rel="icon" type="image/png" href="assets/storyteller-mark.png">
<link rel="apple-touch-icon" href="assets/storyteller-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<div id="progress"></div>
<header id="header">
  <a class="brand" href="#home">
    <img class="brand-mark" src="assets/storyteller-mark.png" alt="" aria-hidden="true">
    <span>STORYTELLER</span>
  </a>
  <nav>
    <a href="#home">Home</a>
    <a href="#explore">Explore</a>
    <a href="#write">Write</a>
  </nav>
  <div class="actions">
    <button id="searchBtn" class="icon-btn" aria-label="Search"></button>
    <button id="bell" class="icon-btn" aria-label="Notifications"></button>
    <button id="theme" class="icon-btn" aria-label="Change theme"></button>
    <button class="avatar" aria-label="Open profile" onclick="location.hash='profile'">AM</button>
  </div>
</header>
<main id="app"></main>
<div id="search" class="overlay" role="dialog" aria-modal="true" aria-label="Search stories">
  <div class="search-panel">
    <label>Search<input id="searchInput" placeholder="Search stories, authors, tags..."><kbd>ESC</kbd></label>
    <div id="results"></div>
  </div>
</div>
<aside id="notifications">
  <div class="between">
    <h3>Notifications</h3>
    <button id="markRead">Mark all read</button>
  </div>
  <div id="notificationList"></div>
</aside>
<div id="toast" role="status"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-service.js"></script>
<script src="js/app-v2.js"></script>
</body>
</html>
