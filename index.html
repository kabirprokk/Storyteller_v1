<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0b0b0b">

<meta name="description" content="Storyteller &mdash; stories that stay with you.">
<title>STORYTELLER</title>
<link rel="icon" type="image/png" href="assets/storyteller-mark.png">
<link rel="apple-touch-icon" href="assets/storyteller-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<body>
<div data-human-mount></div>
<div id="progress"></div>
<header id="header">
  <a class="brand" href="#home">
    <img class="brand-mark" src="assets/storyteller-mark.png" alt="" aria-hidden="true">
    <span>STORYTELLER</span>
  </a>
  <nav>
    <a href="#home">Home</a>
    <a href="#explore">Explore</a>
    <a href="#write">Write</a>
  </nav>
  <div class="actions">
    <button id="searchBtn" class="icon-btn" aria-label="Search"></button>
    <button id="bell" class="icon-btn" aria-label="Notifications"></button>
    <button id="theme" class="icon-btn" aria-label="Change theme"></button>
    <button id="helpBtn" class="icon-btn help-trigger" aria-label="Open help">?</button>
    <button id="navAvatar" class="avatar" aria-label="Open profile">ST</button>
  </div>
</header>
<main id="app"></main>
<div id="search" class="overlay" role="dialog" aria-modal="true" aria-label="Search stories">
  <div class="search-panel">
    <label>Search<input id="searchInput" placeholder="Search stories, authors, tags..."><kbd>ESC</kbd></label>
    <div id="results"></div>
  </div>
</div>
<div id="helpOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="helpTitle" aria-hidden="true">
  <div class="help-modal">
    <button id="closeHelp" class="help-close" aria-label="Close help">&times;</button>
    <span class="eyebrow">Need a hand?</span>
    <h2 id="helpTitle">Help is close by.</h2>
    <p>Ask a question, report a problem, or suggest an improvement.</p>
    <a class="help-email" data-gmail href="https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=kabirsayed.k%40gmail.com">kabirsayed.k@gmail.com</a>
    <div class="buttons">
      <a class="btn primary" data-help-center href="#helping-panel">Open Help Centre</a>
      <a class="btn" data-gmail href="https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=kabirsayed.k%40gmail.com">Send email</a>
    </div>
  </div>
</div>
<aside id="notifications">
  <div class="between">
    <h3>Notifications</h3>
    <button id="markRead">Mark all read</button>
  </div>
  <div id="notificationList"></div>
</aside>
<div id="toast" role="status"></div>
<audio id="themeAudio" src="assets/storyteller-theme-song.mp3" preload="metadata" loop></audio>
<button id="audioToggle" class="audio-toggle icon-btn" type="button" aria-label="Mute music and sounds" aria-pressed="true"></button>
<script src="vendor/supabase-2.110.7.min.js"></script>
<script src="vendor/dompurify-3.4.12.min.js"></script>
<script src="js/config.js"></script>
<script src="js/supabase-service.js?v=20260722-6"></script>
<script src="js/app-v2.js?v=20260722-8"></script>
<script src="js/human-verification.js?v=20260722-2"></script>
<script src="js/audio-controller.js?v=20260722-1"></script>
</body>
</html>
